services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: fonolife
      POSTGRES_USER: fonolife
      POSTGRES_PASSWORD: fonolife
    volumes: ["postgres_data:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fonolife -d fonolife"]
      interval: 3s
      timeout: 3s
      retries: 20
  app:
    build: .
    environment:
      DATABASE_URL: postgres://fonolife:fonolife@db:5432/fonolife
      PORT: 3000
      APP_ORIGIN: http://localhost:3000
      DEMO_MODE: ${DEMO_MODE:-true}
    ports: ["3000:3000"]
    depends_on:
      db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
volumes:
  postgres_data:
