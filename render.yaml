services:
  - type: web
    name: fonolife
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: fonolife-db
          property: connectionString

databases:
  - name: fonolife-db
    plan: free
    databaseName: fonolife
    user: fonolife
