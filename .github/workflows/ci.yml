name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: docker compose up --build --wait
      - run: curl --fail http://localhost:3000/api/health
      - run: docker compose exec -T app node dist/db/migrate.js
      - run: docker compose exec -T app node dist/db/migrate.js
      - run: docker compose exec -T app node dist/db/seed.js
      - run: docker compose exec -T app node dist/db/seed.js
      - run: node tests/dashboard-smoke.mjs
      - run: node tests/finance-smoke.mjs
      - run: docker compose exec -T db psql -U fonolife -d fonolife < tests/database-devsec.sql
      - run: |
          docker compose exec -T db psql -U fonolife -d fonolife -v ON_ERROR_STOP=0 -c "UPDATE financial_entries SET amount_cents=1" 2>&1 | tee /tmp/update.log
          grep -q "histórico financeiro é imutável" /tmp/update.log
          docker compose exec -T db psql -U fonolife -d fonolife -v ON_ERROR_STOP=0 -c "DELETE FROM financial_entries" 2>&1 | tee /tmp/delete.log
          grep -q "histórico financeiro é imutável" /tmp/delete.log
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: node tests/devsec-smoke.mjs
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-evidencias
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
      - if: always()
        run: docker compose logs
      - if: always()
        run: docker compose down -v
  image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/millennium42/fonolife:${{ github.sha }}
